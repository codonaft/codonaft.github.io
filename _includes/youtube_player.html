<p style="text-align: center">
{% if include.autoplay %}
  <div class="video-container" style="background-color: #d8d8d8; text-align: center" data-aspect-ratio="{{ include.aspect_ratio }}">
    <iframe type="text/html" width="100%" height="0" src="https://www.youtube.com/embed/{{ include.id }}?autoplay=1&origin={{ site.url }}&start={{ include.start }}&rel=0" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
{% else %}
  <div style="width: 0; height: 0; max-width: 100%; margin: auto; overflow: hidden" class="ytdefer" data-src="{{ include.id }}" data-start="{{ include.start }}" data-aspect-ratio="{{ include.aspect_ratio }}"></div>
{% endif %}
</p>
