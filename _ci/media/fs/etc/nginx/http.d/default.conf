limit_req_zone $binary_remote_addr zone=requests_per_ip:10m rate=5r/s;
limit_req zone=requests_per_ip burst=5 nodelay;
limit_req_status 429;

limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;
limit_conn connections_per_ip 50;

server {
  listen 80 default_server;
  listen [::]:80 default_server;

  location / {
    return 301 https://$host$request_uri;
  }

  location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    root /var/www/certbot;
  }

  location = /.well-known/acme-challenge/ {
    return 404;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name .codonaft.star.is;
  ssl_certificate /etc/nginx/ssl/codonaft.star.is/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/codonaft.star.is/privkey.pem;
  ssl_trusted_certificate /etc/nginx/ssl/codonaft.star.is/chain.pem;

  # Everything is a 404
  location / {
    return 404;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # # HTTP/3
  # listen 443 quic reuseport;
  # listen [::]:443 quic reuseport;
  # ssl_quic on;
  # ssl_early_data on;
  # add_header Alt-Svc 'h2=":$server_port"; ma=86400, h3-29=":$server_port"; ma=86400, h3=":$server_port"; ma=86400' always;
  # #add_header Alt-Svc 'h2=":$server_port"; ma=2592000; persist=1';
  # #add_header Alt-Svc 'h3=":$server_port"; ma=86400';
  # ssl_early_data on;
  # ssl_ciphers HIGH:!aNULL:!MD5;
  # ssl_prefer_server_ciphers on;
  # #add_header X-Early-Data $tls1_3_early_data; # Debug 0-RTT
  # add_header x-frame-options "deny";

  server_name media.codonaft.com;
  ssl_certificate /etc/nginx/ssl/codonaft.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/codonaft.com/privkey.pem;
  ssl_trusted_certificate /etc/nginx/ssl/codonaft.com/chain.pem;

  # https://github.com/Chocobozzz/PeerTube/blob/714f7aebad5d664f8964fae95f07808e2df2caef/support/nginx/peertube#L177C1-L187C1
  client_body_timeout       30s; # default is 60
  client_header_timeout     10s; # default is 60
  send_timeout              10s; # default is 60
  keepalive_timeout         10s; # default is 75
  resolver_timeout          10s; # default is 30
  reset_timedout_connection on;
  proxy_ignore_client_abort on;
  tcp_nopush                on; # send headers in one piece
  tcp_nodelay               on; # don't buffer data sent, good for small data bursts in real time

  # Enabling the sendfile directive eliminates the step of copying the data into the buffer
  # and enables direct copying data from one file descriptor to another.
  sendfile on;
  sendfile_max_chunk 1M; # prevent one fast connection from entirely occupying the worker process. should be > 800k.
  aio threads;

  # Everything is a 404
  location / {
    return 404;
  }

  location ~ \.(m3u8|ts|mp4)$ {
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header Cache-Control "public, max-age=31536000, immutable"; # 1 year
    expires 1y;
    limit_rate_after 5M;
    limit_rate 5M;
    root /var/www/$server_name;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name omv.codonaft.com;
  ssl_certificate /etc/nginx/ssl/codonaft.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/codonaft.com/privkey.pem;
  ssl_trusted_certificate /etc/nginx/ssl/codonaft.com/chain.pem;

  location / {
    default_type "text/plain";
    return 301 https://raw.githubusercontent.com/codonaft/ohmyvps/main/install.sh;
  }
}

